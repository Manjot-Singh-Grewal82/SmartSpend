<div class="min-h-screen bg-gray-100 p-6">

  <div class="max-w-7xl mx-auto">

    <!-- NAVIGATION -->

    <div
      class="flex flex-wrap gap-4 mb-6">

      <button
        routerLink="/dashboard"

        class="bg-blue-600 text-white px-5 py-3 rounded-xl hover:bg-blue-700 transition">

        Dashboard

      </button>

      <button
        routerLink="/expenses"

        class="bg-green-600 text-white px-5 py-3 rounded-xl hover:bg-green-700 transition">

        My Expenses

      </button>

    </div>

    <!-- TITLE -->

    <div class="mb-8">

      <h1
        class="text-4xl font-bold text-gray-800">

        Expense Insights

      </h1>

      <p class="text-gray-500 mt-2">

        Smart analytics & reports

      </p>

    </div>

    <!-- FILTERS -->

    <div
      class="bg-white rounded-2xl shadow p-6 mb-8">

      <div
        class="grid grid-cols-1 md:grid-cols-4 gap-4">

        <!-- START DATE -->

        <input
          type="date"

          [(ngModel)]="startDate"

          class="border rounded-xl px-4 py-3"
        />

        <!-- END DATE -->

        <input
          type="date"

          [(ngModel)]="endDate"

          class="border rounded-xl px-4 py-3"
        />

        <!-- CATEGORY -->

        <select
          [(ngModel)]="selectedCategory"

          class="border rounded-xl px-4 py-3">

          <option value="">
            All Categories
          </option>

          <option value="Food">
            Food
          </option>

          <option value="Transport">
            Transport
          </option>

          <option value="Entertainment">
            Entertainment
          </option>

          <option value="Groceries">
            Groceries
          </option>

          <option value="Utilities">
            Utilities
          </option>

        </select>

        <!-- BUTTONS -->

        <div class="flex gap-3">

          <button

            (click)="applyFilters()"

            class="bg-blue-600 text-white px-5 py-3 rounded-xl">

            Apply

          </button>

          <button

            (click)="resetFilters()"

            class="bg-gray-300 px-5 py-3 rounded-xl">

            Reset

          </button>

        </div>

      </div>

    </div>

    <!-- ANALYTICS CARDS -->

    <div
      class="grid grid-cols-1 md:grid-cols-5 gap-6 mb-8">

      <!-- TOTAL -->

      <div
        class="bg-white rounded-2xl shadow p-6">

        <h2 class="text-gray-500">
          Total Spending
        </h2>

        <p
          class="text-3xl font-bold text-blue-600 mt-2">

          ₹ {{ totalAmount }}

        </p>

      </div>

      <!-- AVERAGE -->

      <div
        class="bg-white rounded-2xl shadow p-6">

        <h2 class="text-gray-500">
          Average Expense
        </h2>

        <p
          class="text-3xl font-bold text-green-600 mt-2">

          ₹ {{ averageExpense | number:'1.0-0' }}

        </p>

      </div>

      <!-- HIGHEST -->

      <div
        class="bg-white rounded-2xl shadow p-6">

        <h2 class="text-gray-500">
          Highest Expense
        </h2>

        <p
          class="text-3xl font-bold text-red-600 mt-2">

          ₹ {{ highestExpense }}

        </p>

      </div>

      <!-- LOWEST -->

      <div
        class="bg-white rounded-2xl shadow p-6">

        <h2 class="text-gray-500">
          Lowest Expense
        </h2>

        <p
          class="text-3xl font-bold text-yellow-600 mt-2">

          ₹ {{ lowestExpense }}

        </p>

      </div>

      <!-- TRANSACTIONS -->

      <div
        class="bg-white rounded-2xl shadow p-6">

        <h2 class="text-gray-500">
          Transactions
        </h2>

        <p
          class="text-3xl font-bold text-purple-600 mt-2">

          {{ totalTransactions }}

        </p>

      </div>

    </div>

    <!-- PIE CHART -->

    <div
      class="bg-white rounded-2xl shadow p-6">

      <h2
        class="text-2xl font-bold mb-6">

        Category Breakdown

      </h2>

      <div class="max-w-md mx-auto">

        <canvas

          baseChart

          [data]="{
            labels: pieChartLabels,
            datasets: pieChartDatasets
          }"

          [type]="pieChartType"

          [options]="pieChartOptions">

        </canvas>

      </div>

    </div>

  </div>

</div>
