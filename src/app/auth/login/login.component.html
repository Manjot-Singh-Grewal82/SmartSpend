<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-2xl shadow-lg">

    <!-- Header -->
    <div class="text-center">
      <h2 class="text-3xl font-extrabold text-gray-900">Welcome back</h2>
      <p class="mt-2 text-sm text-gray-600">Please sign in to your account</p>
    </div>

    <!-- Error Alert -->
    @if (error()) {
    <div class="rounded-md bg-red-50 p-4 border border-red-200">
      <p class="text-sm text-red-700">{{ error() }}</p>
    </div>
    }

    <form class="mt-8 space-y-6" [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <!-- Email -->
      <div>
        <label class="block text-sm font-medium text-gray-700">Email</label>
        <input type="email" formControlName="email"
          class="mt-1 w-full px-3 py-3 border rounded-lg focus:ring-blue-500">
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-medium text-gray-700">Password</label>
        <div class="relative">
          <input [type]="showPassword() ? 'text' : 'password'" formControlName="password"
            class="mt-1 w-full px-3 py-3 border rounded-lg">
          <button type="button" class="absolute right-3 top-3"
            (click)="togglePasswordVisibility()">
            👁
          </button>
        </div>
      </div>

      <!-- Forgot -->
      <div class="text-right">
        <a routerLink="/forgot-password" class="text-sm text-blue-600">Forgot password?</a>
      </div>

      <!-- Submit -->
      <button type="submit"
        class="w-full py-3 bg-blue-600 text-white rounded-lg">
        @if (isLoading()) { Signing in... } @else { Sign in }
      </button>

      <!-- Signup -->
      <p class="text-center text-sm">
        Don't have an account?
        <a routerLink="/signup" class="text-blue-600">Sign up</a>
      </p>

    </form>

    <!-- Social (removed apiUrl completely) -->
    <div class="mt-6 text-center text-gray-500 text-sm">
      Social login coming soon
    </div>

  </div>
</div>
