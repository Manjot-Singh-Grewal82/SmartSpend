<div class="min-h-screen bg-gray-100 py-10 px-4">

  <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-lg p-8">

    <!-- ========================= -->
    <!-- HEADER -->
    <!-- ========================= -->

    <div class="text-center mb-10">

      <h1 class="text-4xl font-bold text-gray-800">
        Add Expense
      </h1>

      <p class="text-gray-500 mt-2 text-lg">
        Add your expense details below
      </p>

    </div>

    <!-- ========================= -->
    <!-- FORM -->
    <!-- ========================= -->

    <form
      [formGroup]="expenseForm"
      (ngSubmit)="onSubmit()">

      <!-- TITLE -->

      <div class="mb-6">

        <label
          class="block text-gray-700 font-semibold mb-2">

          Title

        </label>

        <div class="relative">

          <span
            class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">

            ✏️

          </span>

          <input
            type="text"
            formControlName="title"
            placeholder="Enter expense title"
            class="w-full border border-gray-300 rounded-xl py-4 pl-12 pr-4 focus:outline-none focus:ring-2 focus:ring-blue-500"
          />

        </div>

      </div>

      <!-- AMOUNT + CATEGORY -->

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">

        <!-- AMOUNT -->

        <div>

          <label
            class="block text-gray-700 font-semibold mb-2">

            Amount

          </label>

          <div class="relative">

            <span
              class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 font-bold">

              ₹

            </span>

            <input
              type="number"
              formControlName="amount"
              placeholder="Enter amount"
              class="w-full border border-gray-300 rounded-xl py-4 pl-10 pr-4 focus:outline-none focus:ring-2 focus:ring-blue-500"
            />

          </div>

        </div>

        <!-- CATEGORY -->

        <div>

          <label
            class="block text-gray-700 font-semibold mb-2">

            Category

          </label>

          <select
            formControlName="category"
            class="w-full border border-gray-300 rounded-xl py-4 px-4 focus:outline-none focus:ring-2 focus:ring-blue-500">

            <option value="">
              Select Category
            </option>

            <option value="Groceries">
              Groceries
            </option>

            <option value="Leisure">
              Leisure
            </option>

            <option value="Electronics">
              Electronics
            </option>

            <option value="Utilities">
              Utilities
            </option>

            <option value="Clothing">
              Clothing
            </option>

            <option value="Health">
              Health
            </option>

            <option value="Others">
              Others
            </option>

          </select>

        </div>

      </div>

      <!-- DATE -->

      <div class="mb-8">

        <label
          class="block text-gray-700 font-semibold mb-2">

          Date

        </label>

        <input
          type="date"
          formControlName="date"
          class="w-full border border-gray-300 rounded-xl py-4 px-4 focus:outline-none focus:ring-2 focus:ring-blue-500"
        />

      </div>

      <!-- ERROR -->

      <div
        *ngIf="error"
        class="bg-red-100 text-red-700 px-4 py-3 rounded-lg mb-6">

        {{ error }}

      </div>

      <!-- BUTTONS -->

      <div class="flex justify-between items-center">

        <button
          type="button"
          routerLink="/expenses"
          class="text-gray-600 hover:text-black font-medium">

          ← Back

        </button>

        <button
          type="submit"
          [disabled]="isLoading"
          class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-semibold transition">

          {{ isLoading ? 'Adding...' : 'Add Expense' }}

        </button>

      </div>

    </form>

  </div>

</div>
