<div class="bg-white rounded-lg shadow-sm p-6">

  <!-- HEADER -->

  <div
    class="flex flex-col md:flex-row md:justify-between md:items-center gap-4 mb-6">

    <h2
      class="text-3xl font-bold text-gray-800">

      My Expenses

    </h2>

    <div class="flex gap-3">

      <button

        (click)="exportCSV()"

        class="bg-green-600 hover:bg-green-700 text-white px-5 py-2 rounded-lg">

        Export CSV

      </button>

      <button

        (click)="exportPDF()"

        class="bg-red-600 hover:bg-red-700 text-white px-5 py-2 rounded-lg">

        Export PDF

      </button>

      <a

        routerLink="/add-expense"

        class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg">

        Add Expense

      </a>

    </div>

  </div>

  <!-- SEARCH -->

  <div class="mb-6">

    <input
      type="text"

      placeholder="Search expenses..."

      [(ngModel)]="searchText"

      (input)="filterExpenses()"

      class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
    />

  </div>

  <!-- EXPENSE LIST -->

  <div class="space-y-4">

    @for (expense of filteredExpenses(); track expense.id) {

      <div
        class="border rounded-xl p-5 flex flex-col md:flex-row md:justify-between md:items-center">

        <div>

          <h3
            class="text-xl font-semibold text-gray-800">

            {{ expense.title }}

          </h3>

          <p class="text-gray-500 mt-1">

            {{ expense.date | date:'mediumDate' }}

          </p>

        </div>

        <div
          class="flex items-center gap-4 mt-4 md:mt-0">

          <span

            class="px-3 py-1 rounded-full text-sm font-medium"

            [ngClass]="getCategoryClass(expense.category)">

            {{ expense.category }}

          </span>

          <span
            class="text-xl font-bold text-green-600">

            ₹ {{ expense.amount }}

          </span>

          <button

            (click)="editExpense(expense)"

            class="bg-yellow-500 hover:bg-yellow-600 text-white px-4 py-2 rounded-lg">

            Edit

          </button>

          <button

            (click)="deleteExpense(expense.id)"

            class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg">

            Delete

          </button>

        </div>

      </div>

    }

    <!-- EMPTY -->

    @if (filteredExpenses().length === 0) {

      <div
        class="text-center py-12 text-gray-500">

        No expenses found

      </div>

    }

  </div>

</div>
